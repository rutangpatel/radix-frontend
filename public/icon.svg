<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: black; }
      .foreground { fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: white; }
      .foreground { fill: black; }
    }
    .r-text {
      font-family: 'Inter', 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-weight: 800;
      font-size: 110px;
    }
  </style>
  <g clip-path="url(#clip0_7960_43945)">
    <!-- Base Background shape -->
    <rect class="background" width="180" height="180" rx="37" />
    <g style="transform: scale(95%); transform-origin: center">
      <!-- Geometric "R" rendering -->
      <text class="foreground r-text" x="50%" y="50%" dominant-baseline="central" text-anchor="middle" dy="5">R</text>
    </g>
  </g>
</svg>